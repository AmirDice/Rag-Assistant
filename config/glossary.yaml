# Domain glossary — seed data loaded into SQLite on first startup.
#
# Purpose
#   • Fix domain-specific typos/variants a generic spell-checker never catches
#     (acronyms, product terms).
#   • Enrich short / shorthand queries with canonical terms so retrieval
#     (dense + sparse) has the right tokens to match.
#
# Runtime behaviour
#   • The glossary is editable from the UI / admin API. Edits in the DB
#     override this file.
#   • `term`        → canonical form written into the enriched query.
#   • `aliases`     → variants/typos that, when detected, get replaced by
#                      `term` (case-insensitive, accent-insensitive, whole-word).
#   • `expansion`   → optional extra tokens appended to widen lexical recall.
#   • `description` → human-readable note shown in admin UI; never sent to LLM.
#
# These are generic terms for the bundled Acme Cloud demo corpus — replace with
# your own domain terms for a real deployment.

version: 1

entries:
  - term: "SSO"
    aliases: ["sso", "single sign on", "single sign-on", "sso login"]
    expansion: "single sign-on authentication SAML OIDC"
    description: "Single sign-on login via SAML or OIDC."

  - term: "2FA"
    aliases: ["2fa", "two factor", "two-factor", "2 factor authentication", "mfa", "multi factor"]
    expansion: "two-factor authentication authenticator"
    description: "Two-factor / multi-factor authentication."

  - term: "ACL"
    aliases: ["acl", "access control list", "permissions list", "file permissions"]
    expansion: "access control list permissions"
    description: "Per-file / per-folder access control list."

  - term: "workspace"
    aliases: ["workspace", "work space", "team workspace"]
    expansion: "team workspace members"
    description: "A team's space for files and members."

  - term: "shared drive"
    aliases: ["shared drive", "shared folder", "team drive"]
    expansion: "shared drive team folder"
    description: "A drive shared across a whole team."

  - term: "API key"
    aliases: ["api key", "api token", "access token", "developer key"]
    expansion: "API key developer token"
    description: "Secret key used to call the API."

  - term: "webhook"
    aliases: ["webhook", "web hook", "callback url"]
    expansion: "webhook callback notification event"
    description: "HTTP callback fired on file events."

  - term: "retention policy"
    aliases: ["retention policy", "data retention", "retention rule"]
    expansion: "data retention policy auto delete"
    description: "Rule for automatically deleting old data."

  - term: "audit log"
    aliases: ["audit log", "audit trail", "activity log"]
    expansion: "audit log activity trail compliance"
    description: "Record of sign-ins and security-relevant activity."
