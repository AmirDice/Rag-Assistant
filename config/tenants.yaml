# Tenant configuration
# Each tenant maps to one client installation.
# Use `erp_version` (preferred) or `legacy_erp_version` for document version filtering.

tenants:
  demo:
    name: "Demo Tenant"
    erp_version: 5.0
    contracted_modules:
      - "rowa"
      - "dispensador"
    has_robot_integration: true
    preferred_lang: "es"

