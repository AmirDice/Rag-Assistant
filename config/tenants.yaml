# Tenant configuration
# Each tenant maps to one installation / customer.
# Use `erp_version` (preferred) or `legacy_erp_version` for document version filtering.

tenants:
  demo:
    name: "Demo Tenant"
    erp_version: 5.0
    contracted_modules: []          # empty = no module filtering (see all core docs)
    has_robot_integration: true
    preferred_lang: "en"

