[theme]
base = "light"
primaryColor = "#334155"
backgroundColor = "#f8fafc"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
headless = true

[client]
# Hide the Deploy button + dev menu for a clean demo/portfolio UI.
toolbarMode = "minimal"
